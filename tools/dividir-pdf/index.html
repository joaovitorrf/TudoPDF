pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let selectedFile  = null;
let pdfJsDoc      = null;    // PDF.js doc para thumbnails
let totalPages    = 0;
let currentMode   = 'interval';
let intervals     = [];      // [{label, from, to}]
let selectedPages = new Set(); // para modo "each"
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') loadFile(file);
  else showToast('⚠️ Por favor, selecione um arquivo PDF.');
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
document.getElementById('file-remove').addEventListener('click', resetTool);

async function loadFile(file) {
  selectedFile = file;
  const buf = await file.arrayBuffer();

  // Carrega com pdf-lib para contar páginas
  const pdfLib = await PDFLib.PDFDocument.load(buf, { ignoreEncryption: true });
  totalPages   = pdfLib.getPageCount();

  // Carrega com PDF.js para thumbnails
  pdfJsDoc = await pdfjsLib.getDocument({ data: buf.slice() }).promise;

  // UI
  document.getElementById('file-name').textContent = file.name;
  document.getElementById('file-size-info').textContent =
    `${formatBytes(file.size)} · ${totalPages} página${totalPages > 1 ? 's' : ''}`;

  dropZone.style.display = 'none';
  document.getElementById('file-preview').classList.add('show');
  document.getElementById('mode-section').classList.add('show');
  document.getElementById('split-btn').classList.add('show');
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('progress-wrap').classList.remove('show');

  applyMode();
}
function selectMode(mode, el) {
  currentMode = mode;
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  applyMode();
}

function applyMode() {
  if (currentMode === 'interval') {
    document.getElementById('interval-section').classList.add('show');
    document.getElementById('page-viewer').classList.remove('show');
  } else {
    document.getElementById('interval-section').classList.remove('show');
    document.getElementById('page-viewer').classList.add('show');
    renderThumbnails();
  }
}
async function renderThumbnails() {
  const grid = document.getElementById('pages-grid');
  if (!pdfJsDoc) return;
  grid.innerHTML = '<div class="pages-loading">⏳ Gerando miniaturas...</div>';

  // Aguarda um tick para o loading aparecer
  await new Promise(r => setTimeout(r, 10));
  grid.innerHTML = '';

  for (let i = 1; i <= totalPages; i++) {
    const page     = await pdfJsDoc.getPage(i);
    const viewport = page.getViewport({ scale: 0.3 });
    const canvas   = document.createElement('canvas');
    canvas.width   = viewport.width;
    canvas.height  = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

    const thumb = document.createElement('div');
    thumb.className = 'page-thumb' + (selectedPages.has(i) ? ' selected' : '');
    thumb.dataset.page = i;
    thumb.innerHTML = `<div class="pt-canvas"></div><div class="pt-num">Pág. ${i}</div>`;
    thumb.querySelector('.pt-canvas').appendChild(canvas);
    thumb.addEventListener('click', () => togglePage(i, thumb));
    grid.appendChild(thumb);
  }
  updateSelectionBar();
}

function togglePage(num, el) {
  if (selectedPages.has(num)) { selectedPages.delete(num); el.classList.remove('selected'); }
  else { selectedPages.add(num); el.classList.add('selected'); }
  updateSelectionBar();
}
function selectAll() {
  for (let i = 1; i <= totalPages; i++) selectedPages.add(i);
  document.querySelectorAll('.page-thumb').forEach(t => t.classList.add('selected'));
  updateSelectionBar();
}
function clearSelection() {
  selectedPages.clear();
  document.querySelectorAll('.page-thumb').forEach(t => t.classList.remove('selected'));
  updateSelectionBar();
}
function updateSelectionBar() {
  const bar = document.getElementById('selection-bar');
  const n   = selectedPages.size;
  bar.classList.toggle('show', true);
  document.getElementById('sel-count').textContent =
    n === 0 ? 'Nenhuma página selecionada' : `${n} página${n > 1 ? 's' : ''} selecionada${n > 1 ? 's' : ''}`;
}
document.getElementById('interval-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addInterval();
});

function addInterval() {
  const raw   = document.getElementById('interval-input').value.trim();
  const error = document.getElementById('interval-error');
  const input = document.getElementById('interval-input');

  // Valida formato: "N" ou "N-M"
  const match = raw.match(/^(\d+)(?:-(\d+))?$/);
  if (!match) {
    input.classList.add('error'); error.classList.add('show'); return;
  }

  const from = parseInt(match[1]);
  const to   = match[2] ? parseInt(match[2]) : from;

  if (from < 1 || to > totalPages || from > to) {
    input.classList.add('error');
    error.textContent = `Páginas devem estar entre 1 e ${totalPages}.`;
    error.classList.add('show'); return;
  }

  input.classList.remove('error'); error.classList.remove('show');
  const label = from === to ? `Página ${from}` : `Páginas ${from}–${to}`;
  intervals.push({ label, from, to });
  document.getElementById('interval-input').value = '';
  renderIntervalTags();
}

function renderIntervalTags() {
  const container = document.getElementById('interval-tags');
  container.innerHTML = '';
  intervals.forEach((iv, idx) => {
    const tag = document.createElement('div');
    tag.className = 'interval-tag';
    tag.innerHTML = `${iv.label} <span class="tag-remove" data-idx="${idx}">✕</span>`;
    tag.querySelector('.tag-remove').addEventListener('click', () => {
      intervals.splice(idx, 1); renderIntervalTags();
    });
    container.appendChild(tag);
  });
}
async function startSplit() {
  // Validações
  if (currentMode === 'interval' && intervals.length === 0) {
    showToast('⚠️ Adicione pelo menos um intervalo de páginas.'); return;
  }
  if (currentMode === 'each' && selectedPages.size === 0) {
    showToast('⚠️ Selecione pelo menos uma página.'); return;
  }

  const btn = document.getElementById('split-btn');
  btn.disabled = true; btn.textContent = '⏳ Processando...';
  document.getElementById('progress-wrap').classList.add('show');
  document.getElementById('result-box').classList.remove('show');

  try {
    const buf      = await selectedFile.arrayBuffer();
    const srcDoc   = await PDFLib.PDFDocument.load(buf, { ignoreEncryption: true });
    const baseName = selectedFile.name.replace(/\.pdf$/i, '');

    let parts = []; // [{name, pdfBytes}]

    if (currentMode === 'interval') {
      setProgress(5, 'Processando intervalos...');
      for (let i = 0; i < intervals.length; i++) {
        const iv   = intervals[i];
        const pct  = Math.round(5 + ((i + 1) / intervals.length) * 88);
        setProgress(pct, `Gerando parte ${i + 1} de ${intervals.length}...`);

        const newDoc  = await PDFLib.PDFDocument.create();
        const indices = [];
        for (let p = iv.from; p <= iv.to; p++) indices.push(p - 1); // 0-indexed
        const pages   = await newDoc.copyPages(srcDoc, indices);
        pages.forEach(p => newDoc.addPage(p));
        const bytes   = await newDoc.save();
        const suffix  = iv.from === iv.to ? `_pag${iv.from}` : `_pag${iv.from}-${iv.to}`;
        parts.push({ name: `${baseName}${suffix}.pdf`, bytes });
      }
    } else {
      // Modo "each page"
      const sorted = [...selectedPages].sort((a, b) => a - b);
      for (let i = 0; i < sorted.length; i++) {
        const pageNum = sorted[i];
        const pct     = Math.round(5 + ((i + 1) / sorted.length) * 88);
        setProgress(pct, `Extraindo página ${pageNum}...`);

        const newDoc  = await PDFLib.PDFDocument.create();
        const [page]  = await newDoc.copyPages(srcDoc, [pageNum - 1]);
        newDoc.addPage(page);
        const bytes   = await newDoc.save();
        parts.push({ name: `${baseName}_pag${pageNum}.pdf`, bytes });
      }
    }

    setProgress(98, 'Finalizando...');

    // Monta resultado
    const resultList = document.getElementById('result-files-list');
    resultList.innerHTML = '';
    const blobs = [];

    parts.forEach(part => {
      const blob = new Blob([part.bytes], { type: 'application/pdf' });
      blobs.push({ name: part.name, blob });
      const url  = URL.createObjectURL(blob);

      const item = document.createElement('div');
      item.className = 'result-file-item';
      item.innerHTML = `
        <div class="rfi-icon">📄</div>
        <div class="rfi-info">
          <div class="rfi-name">${part.name}</div>
          <div class="rfi-meta">${formatBytes(blob.size)}</div>
        </div>
        <a class="rfi-download" href="${url}" download="${part.name}">⬇️ Baixar</a>
      `;
      resultList.appendChild(item);
    });

    // Botão "Baixar todos" se mais de 1 arquivo — usa JSZip
    const dlAll = document.getElementById('download-all-btn');
    if (parts.length > 1) {
      dlAll.style.display = 'block';
      dlAll.onclick = async () => {
        dlAll.textContent = '⏳ Compactando...';
        const zip = new JSZip();
        blobs.forEach(b => zip.file(b.name, b.blob));
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const zipUrl  = URL.createObjectURL(zipBlob);
        const a = document.createElement('a');
        a.href = zipUrl; a.download = `${baseName}_dividido.zip`;
        a.click();
        dlAll.textContent = '⬇️ Baixar todos como ZIP';
      };
    } else {
      dlAll.style.display = 'none';
    }

    setProgress(100, 'Concluído!');
    setTimeout(() => {
      document.getElementById('progress-wrap').classList.remove('show');
      document.getElementById('result-box').classList.add('show');
      document.getElementById('result-box').scrollIntoView({ behavior: 'smooth', block: 'start' });
      btn.disabled = false; btn.textContent = '✂️ Dividir novamente';
    }, 400);

  } catch (err) {
    console.error(err);
    showToast('❌ Erro ao dividir o arquivo. Verifique se o PDF não está protegido.');
    btn.disabled = false; btn.textContent = '✂️ Dividir PDF agora';
    document.getElementById('progress-wrap').classList.remove('show');
  }
}

function setProgress(pct, label) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-pct').textContent  = pct + '%';
  document.getElementById('progress-text').textContent = label;
}

function resetTool() {
  selectedFile = null; pdfJsDoc = null;
  totalPages = 0; intervals = []; selectedPages.clear();
  currentMode = 'interval';
  document.getElementById('file-input').value = '';
  dropZone.style.display = 'block';
  document.getElementById('file-preview').classList.remove('show');
  document.getElementById('mode-section').classList.remove('show');
  document.getElementById('interval-section').classList.remove('show');
  document.getElementById('page-viewer').classList.remove('show');
  document.getElementById('split-btn').classList.remove('show');
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('progress-wrap').classList.remove('show');
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('interval-tags').innerHTML = '';
  document.getElementById('pages-grid').innerHTML = '';
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
  document.querySelector('[data-mode="interval"]').classList.add('selected');
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

function toggleFaq(btn) {
  const expanded = btn.getAttribute('aria-expanded') === 'true';
  // fechar todos
  document.querySelectorAll('.faq-q').forEach(b => {
    b.setAttribute('aria-expanded', 'false');
    const a = b.nextElementSibling;
    if (a) a.classList.remove('open');
  });
  if (!expanded) {
    btn.setAttribute('aria-expanded', 'true');
    const a = btn.nextElementSibling;
    if (a) a.classList.add('open');
  }
}
