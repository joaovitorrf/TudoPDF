function initDrawCanvas() {
  const canvas = document.getElementById('draw-canvas');
  const ctx = canvas.getContext('2d');
  let drawing = false, lastX = 0, lastY = 0;
  const getPos = e => {
    const r = canvas.getBoundingClientRect();
    const sx = canvas.width / r.width, sy = canvas.height / r.height;
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
  };
  const start = e => { e.preventDefault(); drawing = true; const p = getPos(e); lastX = p.x; lastY = p.y; };
  const draw  = e => {
    e.preventDefault(); if (!drawing) return;
    const p = getPos(e);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = document.getElementById('draw-color').value;
    ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.stroke();
    lastX = p.x; lastY = p.y;
  };
  const stop = () => drawing = false;
  canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseup', stop); canvas.addEventListener('mouseleave', stop);
  canvas.addEventListener('touchstart', start, { passive:false }); canvas.addEventListener('touchmove', draw, { passive:false }); canvas.addEventListener('touchend', stop);
}

function clearDraw() {
  const canvas = document.getElementById('draw-canvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

async function confirmSignature(type) {
  if (type === 'draw') {
    const canvas = document.getElementById('draw-canvas');
    signatureDataUrl = canvas.toDataURL('image/png');
  } else if (type === 'type') {
    const text = document.getElementById('type-input').value.trim();
    if (!text) { showToast('⚠️ Digite sua assinatura primeiro.'); return; }
    const c = document.createElement('canvas'); c.width = 400; c.height = 100;
    const ctx = c.getContext('2d');
    ctx.font = `48px '${selectedFont}', cursive`;
    ctx.fillStyle = '#1e3a8a';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 10, 50);
    signatureDataUrl = c.toDataURL('image/png');
  } else if (type === 'upload') {
    signatureDataUrl = document.getElementById('sign-img-preview').src;
    if (!signatureDataUrl) { showToast('⚠️ Faça upload de uma imagem.'); return; }
  }

  document.getElementById('sig-drag-img').src = signatureDataUrl;
  document.getElementById('positioner-section').classList.add('show');
  await renderPageForPositioner(currentPageNum);
  document.getElementById('positioner-section').scrollIntoView({ behavior:'smooth', block:'start' });
  initSigDrag();
}

async function renderPageForPositioner(num) {
  const page = await pdfJsDoc.getPage(num);
  const wrap = document.getElementById('page-canvas-wrap');
  const maxW = Math.min(600, wrap.clientWidth || 600);
  const scale = maxW / page.getViewport({ scale: 1 }).width;
  const vp    = page.getViewport({ scale });
  const canvas = document.getElementById('page-canvas');
  canvas.width = vp.width; canvas.height = vp.height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
  document.getElementById('page-info').textContent = `Página ${num} de ${totalPages}`;
  document.getElementById('prev-page-btn').disabled = num <= 1;
  document.getElementById('next-page-btn').disabled = num >= totalPages;
  updateSigPosition();
}

function initSigDrag() {
  const drag = document.getElementById('sig-drag');
  const wrap = document.getElementById('page-canvas-wrap');

  const getPos = e => {
    const r = wrap.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  };

  drag.addEventListener('mousedown', e => {
    isDraggingSig = true;
    const r = drag.getBoundingClientRect();
    const wr = wrap.getBoundingClientRect();
    dragOffsetX = e.clientX - r.left; dragOffsetY = e.clientY - r.top;
    e.preventDefault();
  });
  drag.addEventListener('touchstart', e => {
    isDraggingSig = true;
    const r = drag.getBoundingClientRect(), wr = wrap.getBoundingClientRect();
    dragOffsetX = e.touches[0].clientX - r.left; dragOffsetY = e.touches[0].clientY - r.top;
    e.preventDefault();
  }, { passive:false });

  const move = e => {
    if (!isDraggingSig) return;
    const p = getPos(e);
    const wrap = document.getElementById('page-canvas-wrap');
    const x = Math.max(0, Math.min(wrap.clientWidth  - drag.offsetWidth,  p.x - dragOffsetX));
    const y = Math.max(0, Math.min(wrap.clientHeight - drag.offsetHeight, p.y - dragOffsetY));
    drag.style.left = x + 'px'; drag.style.top = y + 'px';
    sigPos = { x: x / wrap.clientWidth * 100, y: y / wrap.clientHeight * 100 };
  };
  const end = () => { isDraggingSig = false; };

  document.addEventListener('mousemove', move); document.addEventListener('mouseup', end);
  document.addEventListener('touchmove', e => { if (isDraggingSig) { move(e); e.preventDefault(); } }, { passive:false });
  document.addEventListener('touchend', end);
}

function updateSigPosition() {
  const drag = document.getElementById('sig-drag');
  const wrap = document.getElementById('page-canvas-wrap');
  drag.style.left = (sigPos.x / 100 * wrap.clientWidth)  + 'px';
  drag.style.top  = (sigPos.y / 100 * wrap.clientHeight) + 'px';
}

function resizeSig() {
  const val  = document.getElementById('sig-size').value;
  const drag = document.getElementById('sig-drag');
  drag.style.width = val + 'px';
  document.getElementById('sig-size-val').textContent = val + 'px';
}

async function changePage(delta) {
  currentPageNum = Math.max(1, Math.min(totalPages, currentPageNum + delta));
  await renderPageForPositioner(currentPageNum);
}
async function applySignature() {
  const btn = document.getElementById('apply-sign-btn');
  btn.disabled = true; btn.textContent = '⏳ Aplicando...';
  document.getElementById('progress-wrap').classList.add('show');
  document.getElementById('result-box').classList.remove('show');

  try {
    setProgress(10, 'Carregando PDF...');
    const buf    = await selectedFile.arrayBuffer();
    const pdfDoc = await PDFLib.PDFDocument.load(buf, { ignoreEncryption: true });
    const pages  = pdfDoc.getPages();
    const page   = pages[currentPageNum - 1];
    const { width, height } = page.getSize();

    setProgress(40, 'Processando assinatura...');
    // Convert signature to PNG bytes
    const img = await loadImg(signatureDataUrl);
    const c   = document.createElement('canvas');
    c.width = img.naturalWidth; c.height = img.naturalHeight;
    c.getContext('2d').drawImage(img, 0, 0);
    const pngBytes = await fetch(c.toDataURL('image/png')).then(r => r.arrayBuffer());
    const sigEmbed = await pdfDoc.embedPng(pngBytes);

    setProgress(65, 'Posicionando assinatura...');
    // Get size from slider (in display px), convert to PDF pts
    const canvas  = document.getElementById('page-canvas');
    const wrap    = document.getElementById('page-canvas-wrap');
    const scaleX  = width  / canvas.width;
    const scaleY  = height / canvas.height;
    const drag    = document.getElementById('sig-drag');
    const sigW_px = drag.offsetWidth;
    const sigH_px = drag.offsetHeight;
    const sigX_px = parseFloat(drag.style.left) || 0;
    const sigY_px = parseFloat(drag.style.top)  || 0;

    // PDF coords (origin bottom-left)
    const pdfX  = sigX_px * scaleX;
    const pdfY  = height - (sigY_px + sigH_px) * scaleY;
    const pdfW  = sigW_px * scaleX;
    const pdfH  = sigH_px * scaleY;

    page.drawImage(sigEmbed, { x: pdfX, y: pdfY, width: pdfW, height: pdfH });

    setProgress(88, 'Salvando...');
    const bytes = await pdfDoc.save();
    const blob  = new Blob([bytes], { type: 'application/pdf' });
    setProgress(100, 'Concluído!');

    setTimeout(() => {
      const url = URL.createObjectURL(blob);
      document.getElementById('download-link').href = url;
      document.getElementById('download-link').download = selectedFile.name.replace(/\.pdf$/i, '_assinado.pdf');
      document.getElementById('result-sub').textContent = `Assinatura na página ${currentPageNum} · ${formatBytes(blob.size)}`;
      document.getElementById('progress-wrap').classList.remove('show');
      document.getElementById('result-box').classList.add('show');
      document.getElementById('result-box').scrollIntoView({ behavior:'smooth', block:'center' });
      btn.disabled = false; btn.textContent = '✍️ Aplicar novamente';
    }, 400);
  } catch(err) {
    console.error(err);
    showToast('❌ Erro ao aplicar assinatura. Tente novamente.');
    btn.disabled = false; btn.textContent = '✍️ Aplicar assinatura e salvar';
    document.getElementById('progress-wrap').classList.remove('show');
  }
}

function loadImg(src) {
  return new Promise((res,rej) => { const i = new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=src; });
}

function setProgress(pct, label) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-text').textContent = label;
}

function resetTool() {
  selectedFile = null; pdfJsDoc = null; totalPages = 0; currentPageNum = 1; signatureDataUrl = null;
  fileInput.value = ''; dropZone.style.display = 'block';
  ['file-preview','sign-section','positioner-section','result-box','progress-wrap']
    .forEach(id => document.getElementById(id).classList.remove('show'));
  document.getElementById('progress-bar').style.width = '0%';
  clearDraw();
  document.getElementById('type-input').value = '';
  document.getElementById('sign-img-preview').src = '';
  document.getElementById('sign-img-preview').classList.remove('show');
  document.getElementById('sig-upload-zone').style.display = 'block';
  document.getElementById('upload-use-btn').style.display = 'none';
  sigPos = { x: 20, y: 20 };
}

function formatBytes(b) {
  if (b < 1024) return b + ' B'; if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(2) + ' MB';
}

function toggleFaq(btn) {
  const expanded = btn.getAttribute('aria-expanded') === 'true';
  // fechar todos
  document.querySelectorAll('.faq-q').forEach(b => {
    b.setAttribute('aria-expanded', 'false');
    const a = b.nextElementSibling;
    if (a) a.classList.remove('open');
  });
  if (!expanded) {
    btn.setAttribute('aria-expanded', 'true');
    const a = btn.nextElementSibling;
    if (a) a.classList.add('open');
  }
}
