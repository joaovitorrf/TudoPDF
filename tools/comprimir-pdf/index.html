// Configura worker do PDF.js
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let selectedFile   = null;
let selectedQuality = 'medium';
let compressedBlob = null;
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') loadFile(file);
  else showToast('⚠️ Por favor, selecione um arquivo PDF.');
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

function loadFile(file) {
  selectedFile = file;
  document.getElementById('file-name').textContent = file.name;
  document.getElementById('file-size').textContent = formatBytes(file.size) + ' — pronto para comprimir';
  document.getElementById('file-preview').classList.add('show');
  document.getElementById('compress-options').style.display = 'block';
  document.getElementById('compress-btn').classList.add('show');
  document.getElementById('warn-box').classList.add('show');
  dropZone.style.display = 'none';
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('progress-wrap').classList.remove('show');
}

document.getElementById('file-remove').addEventListener('click', resetTool);

function resetTool() {
  selectedFile   = null;
  compressedBlob = null;
  fileInput.value = '';
  dropZone.style.display = 'block';
  document.getElementById('file-preview').classList.remove('show');
  document.getElementById('compress-options').style.display = 'none';
  document.getElementById('compress-btn').classList.remove('show');
  document.getElementById('warn-box').classList.remove('show');
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('progress-wrap').classList.remove('show');
  document.getElementById('progress-bar').style.width = '0%';
}

function selectQuality(q, el) {
  selectedQuality = q;
  document.querySelectorAll('.quality-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}
async function startCompress() {
  if (!selectedFile) return;

  const btn = document.getElementById('compress-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Processando...';
  document.getElementById('progress-wrap').classList.add('show');
  document.getElementById('result-box').classList.remove('show');
  document.getElementById('warn-box').classList.remove('show');

  // Configurações por nível de qualidade
  // scale: resolução de renderização (menor = menor arquivo)
  // imgQ:  qualidade JPEG (0.0 - 1.0)
  const configs = {
    low:    { scale: 1.5, imgQ: 0.82 },  // Alta qualidade visual
    medium: { scale: 1.2, imgQ: 0.65 },  // Recomendado
    high:   { scale: 0.9, imgQ: 0.45 },  // Máxima compressão
  };
  const { scale, imgQ } = configs[selectedQuality];

  try {
    const originalSize = selectedFile.size;
    const arrayBuffer  = await selectedFile.arrayBuffer();

    // Carrega o PDF com PDF.js
    setProgress(5, 'Carregando PDF...');
    const pdfDoc   = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const numPages = pdfDoc.numPages;

    // Detecta orientação da primeira página
    const firstPage    = await pdfDoc.getPage(1);
    const firstVP      = firstPage.getViewport({ scale: 1 });
    const isLandscape  = firstVP.width > firstVP.height;

    // Cria instância do jsPDF com o tamanho correto
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
      orientation: isLandscape ? 'landscape' : 'portrait',
      unit: 'px',
      format: 'a4',
      compress: true,
    });

    // Dimensões A4 em px (jsPDF interno)
    const pdfW = pdf.internal.pageSize.getWidth();
    const pdfH = pdf.internal.pageSize.getHeight();

    // Canvas reutilizável
    const canvas = document.createElement('canvas');
    const ctx    = canvas.getContext('2d');

    for (let i = 1; i <= numPages; i++) {
      const pct = Math.round(5 + (i / numPages) * 88);
      setProgress(pct, `Comprimindo página ${i} de ${numPages}...`);

      const page     = await pdfDoc.getPage(i);
      const viewport = page.getViewport({ scale });

      canvas.width  = viewport.width;
      canvas.height = viewport.height;

      // Fundo branco (evita transparência virar preto no JPEG)
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      await page.render({ canvasContext: ctx, viewport }).promise;

      // Converte para JPEG com a qualidade escolhida
      const imgData = canvas.toDataURL('image/jpeg', imgQ);

      // Calcula proporção para caber na página A4
      const ratio    = Math.min(pdfW / viewport.width, pdfH / viewport.height);
      const imgW     = viewport.width  * ratio;
      const imgH     = viewport.height * ratio;
      const offsetX  = (pdfW - imgW) / 2;
      const offsetY  = (pdfH - imgH) / 2;

      if (i > 1) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', offsetX, offsetY, imgW, imgH, undefined, 'FAST');
    }

    setProgress(96, 'Finalizando...');

    // Gera o Blob final
    const pdfBytes    = pdf.output('arraybuffer');
    compressedBlob    = new Blob([pdfBytes], { type: 'application/pdf' });

    setProgress(100, 'Concluído!');

    setTimeout(() => {
      showResult(originalSize, compressedBlob.size);
      btn.disabled  = false;
      btn.textContent = '🗜️ Comprimir outro PDF';
    }, 400);

  } catch (err) {
    console.error(err);
    showToast('❌ Erro ao processar o arquivo. Tente novamente.');
    btn.disabled = false;
    btn.textContent = '🗜️ Comprimir PDF agora';
    document.getElementById('progress-wrap').classList.remove('show');
    document.getElementById('warn-box').classList.add('show');
  }
}

function setProgress(pct, label) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-pct').textContent  = pct + '%';
  document.getElementById('progress-text').textContent = label;
}

function showResult(originalSize, newSize) {
  document.getElementById('progress-wrap').classList.remove('show');
  document.getElementById('original-size-result').textContent = formatBytes(originalSize);
  document.getElementById('new-size-result').textContent      = formatBytes(newSize);

  const saved = Math.round((1 - newSize / originalSize) * 100);
  const savedEl = document.getElementById('saved-result');
  savedEl.textContent = (saved > 0 ? saved : 0) + '%';

  // Se ficou maior (PDF só-texto pode acontecer), avisa
  if (newSize >= originalSize) {
    savedEl.textContent = '—';
    savedEl.style.color = 'var(--text-muted)';
    document.getElementById('result-box').querySelector('.result-title').textContent =
      'PDF processado! (já estava otimizado)';
  }

  // Link de download com o arquivo REAL comprimido
  const url  = URL.createObjectURL(compressedBlob);
  const link = document.getElementById('download-link');
  link.href     = url;
  link.download = selectedFile.name.replace(/\.pdf$/i, '_comprimido.pdf');

  document.getElementById('result-box').classList.add('show');
  document.getElementById('result-box').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function formatBytes(bytes) {
  if (bytes < 1024)             return bytes + ' B';
  if (bytes < 1024 * 1024)     return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

function toggleFaq(btn) {
  const expanded = btn.getAttribute('aria-expanded') === 'true';
  // fechar todos
  document.querySelectorAll('.faq-q').forEach(b => {
    b.setAttribute('aria-expanded', 'false');
    const a = b.nextElementSibling;
    if (a) a.classList.remove('open');
  });
  if (!expanded) {
    btn.setAttribute('aria-expanded', 'true');
    const a = btn.nextElementSibling;
    if (a) a.classList.add('open');
  }
}
